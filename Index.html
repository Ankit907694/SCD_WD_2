<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stopwatch Web Application</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="stopwatch-card">
        <h2>SkillCraft Stopwatch</h2>
        <div class="time-display" id="display">00:00:00.00</div>
        
        <div class="buttons">
            <button id="startBtn" class="btn success">Start</button>
            <button id="pauseBtn" class="btn warning">Pause</button>
            <button id="resetBtn" class="btn danger">Reset</button>
            <button id="lapBtn" class="btn info">Lap</button>
        </div>

        <div class="laps-container">
            <h3>Lap Records</h3>
            <ul id="lapsList">
                </ul>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
